# Replace forum-cbc.ru with your real domain before enabling.
# This bootstrap config intentionally avoids ssl_certificate directives so
# nginx can start before certbot issues certificates.

upstream registration_api_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name forum-cbc.ru www.forum-cbc.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 2m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_pass http://registration_api_upstream;
    }
}
